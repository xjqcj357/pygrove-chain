# PyGrove Chain — TESTNET-6 genesis (24-hour announce window)
#
# Fair-launch ceremony (24-hour public-announcement window):
#   - genesis_time_ms is a future, publicly-announced wall-clock time.
#   - The node refuses any block submission while now() < genesis_time_ms.
#   - Block 1 must have timestamp >= parent.timestamp_ms (= genesis_time_ms).
#   - The genesis coinbase carries genesis_headline_hex — a Bitcoin block hash
#     mined before our deploy, as proof-of-no-prior-knowledge.
#   - 24-hour announce window: nobody can mine until the wall clock catches up,
#     so anyone can spin up a node from a clean clone before block 1 lands.
#
# What's new in testnet-6 (the difficulty-retarget fix):
#   - **ASERT-2D actually wired into miner + validator**. Both now go
#     through the same `next_bits_from_parent()` helper so the chain's
#     per-block difficulty target updates from parent (bits, timestamp).
#     Bits are no longer stuck at 0x1f00ffff. With the 8% per-block
#     clamp + tighter bootstrap τ (1 hour vs 2 days post-bootstrap), the
#     discovery loop converges to actual hashrate over ~50-100 blocks.
#   - **`bits_from_target()`**, the missing inverse of `target_from_bits`,
#     with full round-trip test coverage and the Bitcoin-canonical
#     0x80-MSB normalisation step. Without it, the miner couldn't encode
#     an ASERT-derived target back into the compact `bits` field.
#   - **Bits-mismatch consensus check** in `try_apply_block`. The old
#     binary had `if hdr.bits != st.bits { bail!("wrong bits") }` which
#     forced every block to use the *initial* genesis bits forever — the
#     literal cause of the testnet-5 zero-retarget bug. The new validator
#     re-derives the expected bits from parent and rejects mismatches.
#
# What's preserved from testnet-5:
#   - RocksDB state-store backend (opt-in via --features rocksdb)
#   - /metrics Prometheus endpoint
#   - ops/runbook.md operator playbook
#   - Property-based fuzz invariants for apply_block
#   - Long-form emission backtest digest (921ebf27…) pinned for CI
#
# What's preserved from testnet-4:
#   - SLH-DSA-128s (sig_algo=2), BLS12-381 (sig_algo=5), Falcon-512,
#     Ed25519 all dispatch-wired
#   - k-of-N governance threshold sigs on UpgradeCrypto + Register*
#   - WASM contract VM with chain_reflect_get host fn
#   - Reflection writes on every apply_block
#   - UpgradeCrypto activation at target_height
#   - P2P wire protocol + 8-topic gossipsub spec
#   - BFT finality gadget with plain + BLS-aggregated cert verifiers
#   - Calendar-driven emission + ASERT-2D + 8% bits clamp + 25% slew
#     + bootstrap mode for the first 2,016 blocks
#   - Same `pyg1...` address format. Keys carry forward.

chain_id                = "pygrove-testnet-6"
genesis_time_ms         = 1778716820000        # 2026-05-14 00:00:20 UTC (+24h announce window)
genesis_headline_hex    = "0000000000000000000054f816d4e95007fb5ddd141c999a43e9c4ee56aefca3"
# ^ Latest BTC tip at testnet-6 seed time. Embedded into the genesis
#   coinbase slot as proof-of-no-prior-knowledge for the fair-launch
#   ceremony.

# Bitcoin-curve skeleton — same as testnet-2 (laptop-mineable initial bits).
initial_bits            = 0x1f00ffff
target_block_time_ms    = 600000
retarget_interval       = 2016
halving_interval_base   = 210000
seconds_per_halving     = 126000000        # 4 years exactly @ 10-min target × 210000 blocks
initial_reward_sat      = 5000000000      # 50 * 10^8

# v0.4 operator-safety constraints (per-block ASERT + clamps + slew + bootstrap).
asert_tau_ms                       = 172800000   # 2 days, default ASERT half-life
bootstrap_asert_tau_ms             = 3600000     # 1 hour, tighter τ during discovery
bootstrap_height                   = 2016        # below this: capped rewards + tight ASERT
bootstrap_reward_pct               = 50          # bootstrap-mode caps reward at 50% of epoch reward
max_reward_pct_change_per_block    = 25          # slew-rate limit on emission delta
max_bits_pct_change_per_block      = 8           # hard ±8% clamp on per-block ASERT change

# Accordion params
accordion_epsilon       = 0.05
accordion_beta_h        = 0.5             # mining bellow
accordion_beta_a        = 0.5             # adoption bellow
accordion_beta_s        = 0.25            # stability-seeking bias
stability_window_blocks = 2016

# Sybil guard for adoption bellow
sybil_dust_floor_sat    = 100000
sybil_min_age_blocks    = 2016
sybil_require_paid_fee  = true

# Crypto agility
sig_algo                = 1               # 1 = Falcon512 (FN-DSA, integer sampler)
hash_algo               = 1               # 1 = Blake3Xof512

# Cold governance public key (SLH-DSA-128s) — placeholder, set at mainnet
governance_pubkey_hex   = ""

# Initial accounts — empty for fair launch, no premine.
initial_accounts        = []
