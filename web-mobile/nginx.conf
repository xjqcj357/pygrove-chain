# pygrove-mobile — serve the SPA. Reverse-proxying to the chain RPC happens
# upstream in akiyafinder-frontend (the box's TLS-terminating nginx). This
# container only ships static files.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # The SPA. ETag + short cache so edits propagate fast during dev.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=60" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Trivial health endpoint for the upstream proxy to probe.
    location = /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
