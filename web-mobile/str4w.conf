# --- str4w.com / PyGrove mobile wallet -------------------------------------
# Replaces the previous gravestone config. Apex serves the SPA; per-chain
# RPC is proxied at /api/<chain>/rpc so the wallet stays same-origin (no
# CORS, no mixed-content). HTTPS-only via the existing Let's Encrypt cert.
#
# Containers (all on docker network `pygrove-net`):
#   pygrove-mobile          → static SPA (this nginx upstream)
#   pygrove-node            → testnet chain (RPC :8545 inside container)
#   pygrove-node-mainnet    → mainnet chain (RPC :9545 inside container, deployed at mainnet launch)
#
# To revive str4w-as-RealitySoup later: replace the location / block with
# the original proxy_pass to the SPA backend; conf history lives in git.

# HTTP: keep ACME renewal alive, redirect everything else to HTTPS.
server {
    listen 80;
    server_name str4w.com www.str4w.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://str4w.com$request_uri;
    }
}

# HTTPS: redirect www -> apex.
server {
    listen 443 ssl;
    http2 on;
    server_name www.str4w.com;
    ssl_certificate     /etc/letsencrypt/live/str4w.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/str4w.com/privkey.pem;
    return 301 https://str4w.com$request_uri;
}

# HTTPS: the wallet.
server {
    listen 443 ssl;
    http2 on;
    server_name str4w.com;

    ssl_certificate     /etc/letsencrypt/live/str4w.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/str4w.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:Str4wSSL:1m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- chain RPC proxies ---------------------------------------------------
    # Each chain runs in its own pygrove-node container, exposing the same
    # JSON-RPC surface internally on port 8545. We disambiguate at the URL,
    # not the port, so the wallet only needs one fetch path.

    # Testnet (currently `pygrove-testnet-2`).
    location = /api/testnet/rpc {
        proxy_pass         http://pygrove-node:8545/rpc;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 30s;
        client_max_body_size 65k;   # matches MAX_RPC_BODY_BYTES on the node
    }

    # Mainnet (deployed at mainnet launch; container name reserved here).
    location = /api/mainnet/rpc {
        proxy_pass         http://pygrove-node-mainnet:8545/rpc;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 30s;
        client_max_body_size 65k;
    }

    # --- the SPA -------------------------------------------------------------
    location / {
        proxy_pass         http://pygrove-mobile:80;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }
}
