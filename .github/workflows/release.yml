name: release-artifacts

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

# `contents: write` is required so `softprops/action-gh-release@v2` can attach
# binaries to the GitHub Release for a pushed tag. The default GITHUB_TOKEN
# permission is read-only on `contents`, which causes the action to fail with
# "Resource not accessible by integration". This grants only what the release
# step needs — no `packages: write`, no `id-token: write`.
permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  gui-windows:
    name: pygrove-gui.exe (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build pygrove-gui.exe
        run: cargo build --release -p pygrove-gui
      - uses: actions/upload-artifact@v4
        with:
          name: pygrove-gui-windows-x86_64
          path: target/release/pygrove-gui.exe
          if-no-files-found: error
      - name: Attach to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/pygrove-gui.exe
          fail_on_unmatched_files: true

  node-linux:
    name: pygrove-node (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libclang-dev llvm-dev pkg-config build-essential
      - uses: Swatinem/rust-cache@v2
      - name: Build node + cli
        run: cargo build --release --bin pygrove-node --bin pygrove-cli
      - uses: actions/upload-artifact@v4
        with:
          name: pygrove-node-linux-x86_64
          path: |
            target/release/pygrove-node
            target/release/pygrove-cli
          if-no-files-found: error
      - name: Rename for release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cp target/release/pygrove-node pygrove-node-linux-x86_64
          cp target/release/pygrove-cli pygrove-cli-linux-x86_64
      - name: Attach to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pygrove-node-linux-x86_64
            pygrove-cli-linux-x86_64
          fail_on_unmatched_files: true

  node-windows:
    name: pygrove-node.exe + cli (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build node + cli
        run: cargo build --release --bin pygrove-node --bin pygrove-cli
      - uses: actions/upload-artifact@v4
        with:
          name: pygrove-node-windows-x86_64
          path: |
            target/release/pygrove-node.exe
            target/release/pygrove-cli.exe
          if-no-files-found: error
      - name: Attach to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/pygrove-node.exe
            target/release/pygrove-cli.exe
          fail_on_unmatched_files: true
