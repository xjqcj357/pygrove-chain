name: build

on:
  push:
    branches: [main, "feat/**"]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: cargo build + test (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: System deps (rocksdb / crypto / slint)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang libclang-dev llvm-dev pkg-config build-essential \
            libfontconfig1-dev libxkbcommon-dev

      - uses: Swatinem/rust-cache@v2

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo build
        run: cargo build --workspace --all-targets

      - name: cargo test
        run: cargo test --workspace

      # Roadmap #5: FIPS-profile build. Exercises the
      # `pygrove-crypto/fips` feature flag. Drops ed25519-dalek + fn-dsa
      # from the dependency graph (so the slh-dsa signature 2.3.0-pre
      # version requirement doesn't conflict with ed25519-dalek's
      # signature ^2.0). Activates SLH-DSA-128s and the FIPS allowlists.
      # `--no-default-features` is required because the default features
      # (`ed25519` + `falcon`) include the algorithms FIPS excludes.
      - name: cargo build --features fips
        run: cargo build -p pygrove-crypto --no-default-features --features fips

      - name: cargo test --features fips
        run: cargo test -p pygrove-crypto --no-default-features --features fips

      - name: cargo clippy --features fips
        run: cargo clippy -p pygrove-crypto --no-default-features --features fips --all-targets -- -D warnings

      # Roadmap #1: WASM contract VM. Pulls in wasmtime (~100 transitive
      # crates), so we only compile + test the vm crate, not the whole
      # workspace, to keep CI bounded.
      - name: cargo build pygrove-vm --features wasm
        run: cargo build -p pygrove-vm --features wasm --all-targets

      - name: cargo test pygrove-vm --features wasm
        run: cargo test -p pygrove-vm --features wasm

      - name: cargo clippy pygrove-vm --features wasm
        run: cargo clippy -p pygrove-vm --features wasm --all-targets -- -D warnings

      # Risk #3: RocksDB-backed StateStore. Builds the C++ rocksdb deps
      # (~80MB of toolchain on first build), so we test it on its own
      # crate. The state_root matches MemState's exactly, so the rest
      # of the workspace is invariant under this choice.
      - name: cargo build pygrove-state --features rocksdb
        run: cargo build -p pygrove-state --features rocksdb --all-targets

      - name: cargo test pygrove-state --features rocksdb
        run: cargo test -p pygrove-state --features rocksdb

      - name: cargo clippy pygrove-state --features rocksdb
        run: cargo clippy -p pygrove-state --features rocksdb --all-targets -- -D warnings

  sim:
    name: python sim smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: run sim smoke
        working-directory: sim
        run: |
          python -m pip install --upgrade pip
          pip install numpy
          python -c "import accordion; print('accordion import OK')"

  docker:
    name: publish node image (ghcr.io)
    runs-on: ubuntu-latest
    needs: [rust, sim]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
