[package]
name = "pygrove-crypto"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "PyGrove Chain: post-quantum signature dispatch (Falcon-512, SLH-DSA-128s)"

[dependencies]
pygrove-core = { path = "../core" }
thiserror = { workspace = true }
# Phase A bringup signature: Ed25519 (sig_algo = 3). Live in default builds,
# gated out under `--features fips`.
ed25519-dalek = { workspace = true }
rand_core = { workspace = true }
# Phase B hot signature: Falcon-512 / FN-DSA (sig_algo = 1). Wired via fn-dsa
# 0.1 (Pornin's pure-Rust port). Falcon is randomized by spec; verify is
# portable across architectures, sign output is per-call random. Dispatched
# in the non-FIPS code path; FIPS builds refuse algo=1 (Falcon is FIPS 206
# draft, not yet in FIPS_ALLOWLIST_SIG).
fn-dsa = { workspace = true }
# slh-dsa = { workspace = true }    # SLH-DSA-128s wiring lands in roadmap #3

[features]
default = []
# FIPS-profile build. When enabled:
#   - Ed25519 (sig_algo=3) is rejected at the dispatch boundary. Only the
#     FIPS-approved algos (SLH-DSA-128s = 2, ML-DSA-65 = 4, SHA3-512 = 3)
#     remain callable.
#   - `allowed_sig()`/`allowed_hash()` consult `FIPS_ALLOWLIST_*`.
#   - Used by `UpgradeCrypto` validation in `crates/state` to refuse
#     governance rotations to non-FIPS algos on a FIPS-profile node.
# Prerequisite for FedRAMP / FIPS-140-3 module submission.
fips = []
